
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Loading Animation</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a; /* Darker background for more pop */
            font-family: 'Segoe UI', sans-serif;
        }

        /* Pulsing Rings Container */
        .loader {
            position: relative;
            width: 80px;
            height: 80px;
        }

        .loader div {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid transparent;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            animation: ring 1.5s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }

        .loader div:nth-child(2) {
            animation-delay: -0.45s;
            border-top-color: #e74c3c;
        }

        .loader div:nth-child(3) {
            animation-delay: -0.9s;
            border-top-color: #f1c40f;
        }

        @keyframes ring {
            0% { transform: rotate(0deg) scale(1); opacity: 1; }
            50% { transform: rotate(180deg) scale(1.2); opacity: 0.5; }
            100% { transform: rotate(360deg) scale(1); opacity: 1; }
        }

        /* Text styling */
        .loading-text {
            margin-top: 40px;
            color: #ffffff;
            font-weight: 200;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div style="text-align: center;">
        <div class="loader">
            <div></div>
            <div></div>
            <div></div>
        </div>
        <div class="loading-text">Loading...</div>
    </div>

</body>
</html>
